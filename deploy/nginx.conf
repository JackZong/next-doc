# NextDoc Nginx 配置文件示例
# 建议路径: /etc/nginx/sites-available/next-doc

upstream next_doc_backend {
    server 127.0.0.1:3000; # Next.js 默认运行端口
    keepalive 64;
}

# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com; # 替换为您的域名

    # 用于 Let's Encrypt 验证
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS 配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com; # 替换为您的域名

    # SSL 证书路径 (建议使用 Certbot 自动生成)
    ssl_certificate /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # SSL 优化
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (可选)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # 静态资源处理 - Next.js 编译后的静态文件
    location /_next/static/ {
        alias /var/www/next-doc/.next/static/; # 替换为您的实际部署路径
        expires 365d;
        access_log off;
    }

    # 公共静态文件
    location /static/ {
        alias /var/www/next-doc/public/static/;
        expires 30d;
        access_log off;
    }

    # 主应用代理
    location / {
        proxy_pass http_doc_backend;
        proxy_http_version 1.1;
        
        # 必须设置的 Header (对于 Better Auth 和 Next.js 的安全校验至关重要)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # 客户端最大上传限制 (影响附件上传大小)
        client_max_body_size 50M;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # 错误页面处理
    error_page 502 /502.html;
    location = /502.html {
        root /usr/share/nginx/html;
        internal;
    }

    # 日志
    access_log /var/log/nginx/next-doc.access.log;
    error_log /var/log/nginx/next-doc.error.log;
}
